name: Update Diffy CLI Formula

on:
  schedule:
    # Run once a week at midnight on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new version
        id: check_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release view --repo DiffyWebsite/diffy-cli --json tagName --template '{{.tagName}}')
          CURRENT_VERSION=$(grep -E '^\s*version "' Formula/diffy-cli.rb | cut -d '"' -f 2)
          
          echo "Latest version: $LATEST_TAG"
          echo "Current version: $CURRENT_VERSION"
          
          if [ "$LATEST_TAG" == "$CURRENT_VERSION" ]; then
            echo "No update needed."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Update needed to $LATEST_TAG."
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Update Formula
        if: steps.check_version.outputs.update_needed == 'true'
        run: |
          LATEST_TAG="${{ steps.check_version.outputs.latest_tag }}"
          URL="https://github.com/DiffyWebsite/diffy-cli/releases/download/$LATEST_TAG/diffy.phar"
          
          echo "Downloading $URL..."
          curl -L -o diffy.phar "$URL"
          
          SHA256=$(shasum -a 256 diffy.phar | cut -d ' ' -f 1)
          echo "New SHA256: $SHA256"
          
          # Use sed to update the formula file
          # We use | as a delimiter in sed because the URL contains slashes
          sed -i "s|url \".*\"|url \"$URL\"|" Formula/diffy-cli.rb
          sed -i "s|version \".*\"|version \"$LATEST_TAG\"|" Formula/diffy-cli.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/diffy-cli.rb
          
          rm diffy.phar

      - name: Commit and Push
        if: steps.check_version.outputs.update_needed == 'true'
        run: |
          LATEST_TAG="${{ steps.check_version.outputs.latest_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/diffy-cli.rb
          git commit -m "Update diffy-cli to $LATEST_TAG"
          git push
